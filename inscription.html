<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - PME CONNECT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <div class="logo-area">
                <img src="assets/images/logo1.jpeg" alt="logo PME CONNECT">
            </div>
            <nav class="nav-links">
                <a href="index.html">Accueil</a>
                <a href="index.html#apropos">À propos</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#contact">Contacts</a>
            </nav>
            <div>
                <a href="index.html" class="btn-connect">Retour</a>
            </div>
        </div>
    </header>

    <main class="container auth-section">
        <div class="auth-single-box">
            
            <div class="auth-box login-box-clean">
                <h2>Se connecter</h2>
                <p class="auth-subtitle">Accédez à votre espace professionnel et suivez vos clients.</p>
                
                <form action="dashboard.html" method="POST" class="auth-form">
                    <div class="form-group">
                        <label for="login-email">Identifiant ou Adresse Email</label>
                        <input type="email" id="login-email" name="email" placeholder="votre-email@domaine.com" required>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Mot de passe</label>
                        <input type="password" id="login-password" name="password" placeholder="Votre mot de passe" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Mot de passe oublié ?</a>
                    </div>

                    <button type="submit" class="btn-submit btn-login">Se connecter</button>
                </form>

                <div class="auth-switch-link">
                    <p>Vous n'avez pas encore de compte ? <a href="inscription2.html">Créer un compte</a></p>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
