<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - PME CONNECT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="container nav-container">
            <div class="logo-area">
                <img src="assets/images/logo1.jpeg" alt="logo PME CONNECT">
            </div>
            <nav class="nav-links">
                <a href="index.html">Accueil</a>
                <a href="index.html#apropos">À propos</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#contact">Contacts</a>
            </nav>
            <div>
                <a href="connexion.html" class="btn-connect">Connexion</a>
            </div>
        </div>
    </header>

    <main class="container register-section-stacked">
        
        <div class="register-block block-pme">
            <div class="block-title-area">
                <span class="badge-category">Entreprise</span>
                <h2>Nouvelle PME</h2>
                <p class="auth-subtitle">Inscrivez votre commerce pour activer vos outils digitaux (Menus, Flotte, Billetterie).</p>
            </div>
            
            <form action="dashboard.html" method="POST" class="auth-form grid-form">
                <div class="form-group">
                    <label for="reg-company">Nom de l'entreprise / Commerce</label>
                    <input type="text" id="reg-company" name="company_name" placeholder="Ex: Maman Jeanne Resto..." required>
                </div>

                <div class="form-group">
                    <label for="reg-sector">Secteur d'activité principal</label>
                    <select id="reg-sector" name="company_sector" required class="form-select">
                        <option value="" disabled selected>-- Choisissez votre secteur --</option>
                        <option value="restauration">Restauration (Menu digital, Commandes)</option>
                        <option value="location">Location de véhicules (Flotte, Réservations)</option>
                        <option value="evenementiel">Événementiel (Gestion, Billetterie)</option>
                        <option value="autres">Autre secteur d'activité</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="reg-email-pme">Adresse Email professionnelle</label>
                    <input type="email" id="reg-email-pme" name="email" placeholder="contact@votreentreprise.ga" required>
                </div>

                <div class="form-group">
                    <label for="reg-password-pme">Mot de passe</label>
                    <input type="password" id="reg-password-pme" name="password" placeholder="Mot de passe fort" required>
                </div>

                <div class="form-group checkbox-group full-width">
                    <input type="checkbox" id="terms-pme" required>
                    <label for="terms-pme">J'accepte les conditions d'activation des services numériques de PME CONNECT.</label>
                </div>

                <button type="submit" class="btn-submit btn-register full-width">Enregistrer ma PME</button>
            </form>
        </div>

        <div class="register-block block-user">
            <div class="block-title-area">
                <span class="badge-category user-badge">Particulier</span>
                <h2>Nouvel Utilisateur</h2>
                <p class="auth-subtitle">Créez un compte personnel simple pour commander ou réserver auprès de vos PME préférées.</p>
            </div>
            
            <form action="index.html" method="POST" class="auth-form grid-form">
                <div class="form-group">
                    <label for="user-name">Nom complet</label>
                    <input type="text" id="user-name" name="user_name" placeholder="Ex: Jean Junior" required>
                </div>

                <div class="form-group">
                    <label for="user-phone">Numéro de téléphone (Airtel / Moov)</label>
                    <input type="text" id="user-phone" name="user_phone" placeholder="Ex: 077 00 00 00" required>
                </div>

                <div class="form-group">
                    <label for="user-email">Adresse Email personnelle</label>
                    <input type="email" id="user-email" name="user_email" placeholder="mon-email@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="user-password">Mot de passe</label>
                    <input type="password" id="user-password" name="user_password" placeholder="Votre mot de passe" required>
                </div>

                <button type="submit" class="btn-submit btn-login full-width">Créer mon compte Utilisateur</button>
            </form>
        </div>

    </main>

</body>
</html>
